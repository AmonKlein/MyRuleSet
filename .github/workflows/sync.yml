name: Sync Surge and Generate Clash

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions: 
      contents:  read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo with token
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone upstream repo
        run: |
          git clone --branch master --depth=1 https://github.com/ConnersHua/RuleGo.git upstream

      - name: Copy Surge folder
        run: |
          rm -rf Surge
          cp -r upstream/Surge ./Surge

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Generate Clash rules
        run: python generate_clash.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Surge/ Clash/ generate_clash.py
          git commit -m "Auto sync Surge and generate Clash rules" || echo "No changes"
          git push
