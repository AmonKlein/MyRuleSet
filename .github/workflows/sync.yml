name: Sync Surge and Generate Clash

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时更新一次
  workflow_dispatch:       # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone upstream repo
        run: |
          git clone --depth=1 https://github.com/ConnersHua/RuleGo/tree/master.git upstream

      - name: Copy Surge folder
        run: |
          rm -rf Surge
          cp -r upstream/Surge ./Surge

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Generate Clash rules
        run: |
          python generate_clash.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto sync and generate Clash rules" || echo "No changes"
          git push
